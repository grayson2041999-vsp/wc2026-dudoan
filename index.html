<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>⚽ WC 2026 – Dự đoán</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #060b1f;
      --card: #0f1535;
      --card2: #1a2040;
      --accent: #f5c518;
      --accent2: #ff6b35;
      --green: #22c55e;
      --red: #ef4444;
      --text: #f0f4ff;
      --text2: #8892b0;
      --border: #1e2a50;
      --r: 14px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 80px;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    #app-header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #0a1128, #141c40);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #app-header .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    #app-header .logo span { color: var(--accent); }
    #player-badge {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
      font-size: 13px; font-weight: 600; color: var(--accent);
      cursor: pointer;
    }

    /* ── VIEWS ── */
    .view { display: none; padding: 16px; }
    .view.active { display: block; }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--text2);
      margin: 20px 0 10px;
    }

    /* ── PLAYER SELECT ── */
    #view-select h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    #view-select p { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
    .player-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .player-btn {
      background: var(--card); border: 2px solid var(--border);
      border-radius: var(--r); padding: 18px 12px;
      color: var(--text); font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all .15s;
      text-align: center;
    }
    .player-btn:active { transform: scale(.96); background: var(--card2); }
    .player-btn.selected { border-color: var(--accent); background: rgba(245,197,24,.08); color: var(--accent); }

    /* ── MATCHES ── */
    .date-group { margin-bottom: 8px; }
    .date-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--accent);
      padding: 12px 0 6px;
    }
    .match-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px;
      margin-bottom: 8px; cursor: pointer;
      transition: border-color .15s;
      position: relative;
    }
    .match-card:active { border-color: var(--accent2); }
    .match-card.locked { cursor: default; }
    .match-card .group-badge {
      position: absolute; top: 10px; right: 12px;
      font-size: 10px; font-weight: 800; letter-spacing: 1px;
      color: var(--text2); background: var(--card2);
      padding: 2px 7px; border-radius: 10px;
    }
    .match-teams {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 10px;
    }
    .team-name { font-size: 15px; font-weight: 700; flex: 1; }
    .team-name.left { text-align: right; }
    .team-name.right { text-align: left; }
    .vs { font-size: 12px; font-weight: 800; color: var(--text2); min-width: 24px; text-align: center; }
    .match-meta {
      display: flex; align-items: center; justify-content: space-between;
    }
    .match-status {
      font-size: 11px; font-weight: 600; padding: 3px 9px;
      border-radius: 10px;
    }
    .match-status.open { background: rgba(34,197,94,.15); color: var(--green); }
    .match-status.locked { background: rgba(239,68,68,.15); color: var(--red); }
    .match-status.done { background: rgba(245,197,24,.15); color: var(--accent); }
    .my-prediction {
      font-size: 13px; font-weight: 700; color: var(--text2);
    }
    .my-prediction .score { color: var(--text); }
    .my-prediction .pts-plus { color: var(--green); }
    .my-prediction .pts-minus { color: var(--red); }
    .actual-score {
      font-size: 12px; color: var(--accent); font-weight: 700;
    }

    /* ── PREDICT MODAL ── */
    #modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      align-items: flex-end; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      width: 100%; max-width: 480px;
    }
    #modal-box h3 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    #modal-box .modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
    .score-inputs {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 20px;
    }
    .score-inputs input {
      width: 72px; height: 72px;
      background: var(--card2); border: 2px solid var(--border);
      border-radius: var(--r); color: var(--text);
      font-size: 32px; font-weight: 800; text-align: center;
      -moz-appearance: textfield;
    }
    .score-inputs input::-webkit-outer-spin-button,
    .score-inputs input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .score-inputs input:focus { outline: none; border-color: var(--accent); }
    .score-sep { font-size: 28px; font-weight: 900; color: var(--text2); }
    #btn-submit-pred, #btn-admin-save {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--accent), #e6a800);
      border: none; border-radius: var(--r);
      color: #000; font-size: 16px; font-weight: 800;
      cursor: pointer; transition: opacity .15s;
    }
    #btn-submit-pred:active, #btn-admin-save:active { opacity: .85; }
    #btn-cancel-pred {
      width: 100%; padding: 14px;
      background: none; border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text2);
      font-size: 14px; cursor: pointer; margin-top: 8px;
    }

    /* ── LEADERBOARD ── */
    .lb-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 8px;
    }
    .lb-rank { font-size: 18px; font-weight: 900; min-width: 28px; color: var(--text2); }
    .lb-rank.r1 { color: #FFD700; }
    .lb-rank.r2 { color: #C0C0C0; }
    .lb-rank.r3 { color: #CD7F32; }
    .lb-name { font-size: 16px; font-weight: 700; flex: 1; }
    .lb-pts { font-size: 20px; font-weight: 900; color: var(--accent); }
    .lb-detail { font-size: 11px; color: var(--text2); }
    .lb-medal { font-size: 20px; min-width: 24px; text-align: center; }
    .me-badge { font-size: 10px; background: var(--accent); color: #000; border-radius: 6px; padding: 1px 5px; font-weight: 800; vertical-align: middle; margin-left: 4px; }

    /* ── ADMIN ── */
    #view-admin input[type=password], #admin-match-select {
      width: 100%; padding: 14px; margin-bottom: 12px;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text); font-size: 15px;
    }
    #admin-match-select option { background: var(--card2); }
    #btn-admin-login {
      width: 100%; padding: 14px;
      background: var(--accent2); border: none; border-radius: var(--r);
      color: #fff; font-size: 16px; font-weight: 800; cursor: pointer;
    }
    .admin-panel { display: none; }
    .admin-panel.open { display: block; }
    .admin-score-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .admin-score-row input {
      width: 60px; height: 52px; text-align: center;
      background: var(--card2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text); font-size: 22px; font-weight: 800;
      -moz-appearance: textfield;
    }
    .admin-score-row input::-webkit-outer-spin-button,
    .admin-score-row input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .admin-result-list { margin-top: 16px; }
    .admin-result-item {
      background: var(--card2); border-radius: 10px; padding: 10px 14px;
      margin-bottom: 6px; font-size: 13px;
      display: flex; justify-content: space-between; align-items: center;
    }

    /* ── BOTTOM NAV ── */
    #bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: #0a1128; border-top: 1px solid var(--border);
      display: flex;
    }
    #bottom-nav button {
      flex: 1; padding: 12px 8px 14px;
      background: none; border: none; color: var(--text2);
      font-size: 10px; font-weight: 700; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: color .15s;
    }
    #bottom-nav button .icon { font-size: 20px; }
    #bottom-nav button.active { color: var(--accent); }

    /* ── MISC ── */
    .empty-msg { text-align: center; color: var(--text2); padding: 40px 20px; font-size: 15px; }
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; font-weight: 600;
      z-index: 999; opacity: 0; transition: opacity .3s;
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .pred-count {
      font-size: 12px; font-weight: 700; color: var(--text2);
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 3px 9px; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }
    .pred-count:active { background: var(--border); }
    .predictor-list {
      margin-top: 10px; flex-wrap: wrap; gap: 6px;
      border-top: 1px solid var(--border); padding-top: 10px;
    }
    .predictor-chip {
      font-size: 12px; font-weight: 600; padding: 4px 10px;
      background: var(--card2); border-radius: 10px; color: var(--text2);
    }
    .predictor-chip.me { background: rgba(245,197,24,.15); color: var(--accent); }
    .flag { font-size: 18px; }
    .hero-banner {
      background: linear-gradient(135deg, #0f1535, #1a2040);
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 20px; margin-bottom: 20px; text-align: center;
    }
    .hero-banner .ball { font-size: 48px; display: block; margin-bottom: 8px; }
    .hero-banner h2 { font-size: 20px; font-weight: 900; }
    .hero-banner p { font-size: 13px; color: var(--text2); margin-top: 4px; }
    #filter-bar {
      display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto;
      scrollbar-width: none; padding-bottom: 4px;
    }
    #filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0; padding: 6px 14px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; font-size: 12px; font-weight: 700;
      cursor: pointer; color: var(--text2); transition: all .15s;
    }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #000; }
    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-bottom: 16px;
    }
    .stat-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px; text-align: center;
    }
    .stat-box .val { font-size: 22px; font-weight: 900; color: var(--accent); }
    .stat-box .lbl { font-size: 10px; color: var(--text2); font-weight: 700; margin-top: 2px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="app-header">
  <div class="logo">⚽ <span>WC</span> 2026</div>
  <div style="display:flex;gap:8px;align-items:center">
    <button id="lang-btn" onclick="toggleLang()" style="background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:800;color:var(--text2);cursor:pointer;">🌐 RU</button>
    <div id="player-badge" onclick="switchPlayer()">Chọn tên</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ══════════════ VIEW: SELECT PLAYER ══════════════ -->
<div id="view-select" class="view active">
  <div class="hero-banner">
    <span class="ball">🏆</span>
    <h2>FIFA World Cup 2026™</h2>
    <p id="txt-select-sub"></p>
  </div>
  <p class="section-title" id="txt-player-list"></p>
  <div class="player-grid" id="player-grid"></div>
</div>

<!-- ══════════════ VIEW: MATCHES ══════════════ -->
<div id="view-matches" class="view">
  <div id="filter-bar">
    <div class="filter-chip active" data-filter="all" onclick="setFilter(this,'all')" id="fc-all"></div>
    <div class="filter-chip" data-filter="open" onclick="setFilter(this,'open')" id="fc-open"></div>
    <div class="filter-chip" data-filter="pending" onclick="setFilter(this,'pending')" id="fc-pending"></div>
    <div class="filter-chip" data-filter="done" onclick="setFilter(this,'done')" id="fc-done"></div>
  </div>
  <div id="matches-list"></div>
</div>

<!-- ══════════════ VIEW: LEADERBOARD ══════════════ -->
<div id="view-leaderboard" class="view">
  <div class="stats-row" id="my-stats" style="display:none">
    <div class="stat-box"><div class="val" id="stat-correct">0</div><div class="lbl" id="lbl-correct"></div></div>
    <div class="stat-box"><div class="val" id="stat-wrong">0</div><div class="lbl" id="lbl-wrong"></div></div>
    <div class="stat-box"><div class="val" id="stat-total">0</div><div class="lbl" id="lbl-total"></div></div>
  </div>
  <p class="section-title" id="txt-ranking"></p>
  <div id="lb-list"></div>
</div>

<!-- ══════════════ VIEW: ADMIN ══════════════ -->
<div id="view-admin" class="view">
  <p class="section-title">⚙️ Admin</p>
  <div id="admin-login-form">
    <input type="password" id="admin-pwd-input" placeholder="Mật khẩu / Пароль" />
    <button id="btn-admin-login" onclick="adminLogin()"></button>
  </div>
  <div class="admin-panel" id="admin-panel">
    <p style="color:var(--green);font-weight:700;margin-bottom:16px;" id="txt-logged-in"></p>
    <p class="section-title" id="txt-enter-result"></p>
    <select id="admin-match-select" onchange="onAdminMatchSelect()"></select>
    <div id="admin-match-info" style="color:var(--text2);font-size:13px;margin-bottom:12px;"></div>
    <div class="admin-score-row">
      <span id="admin-team1" style="font-weight:700;flex:1;text-align:right;font-size:14px;"></span>
      <input type="number" id="admin-score1" min="0" max="20" value="0">
      <span style="font-size:20px;font-weight:900;color:var(--text2)">–</span>
      <input type="number" id="admin-score2" min="0" max="20" value="0">
      <span id="admin-team2" style="font-weight:700;flex:1;text-align:left;font-size:14px;"></span>
    </div>
    <button id="btn-admin-save" onclick="adminSaveResult()"></button>
    <div class="admin-result-list" id="admin-result-list"></div>
    <p class="section-title" style="margin-top:24px;" id="txt-view-preds"></p>
    <div id="admin-predictions-view"></div>
  </div>
</div>

<!-- ══════════════ PREDICT MODAL ══════════════ -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box">
    <h3 id="modal-match-title"></h3>
    <p class="modal-sub" id="modal-match-sub"></p>
    <div class="score-inputs">
      <input type="number" id="pred-score1" min="0" max="20" value="0" />
      <span class="score-sep">–</span>
      <input type="number" id="pred-score2" min="0" max="20" value="0" />
    </div>
    <button id="btn-submit-pred" onclick="submitPrediction()"></button>
    <button id="btn-cancel-pred" onclick="closeModal()"></button>
  </div>
</div>

<!-- ══════════════ BOTTOM NAV ══════════════ -->
<nav id="bottom-nav">
  <button onclick="showView('matches')" id="nav-matches">
    <span class="icon">🏆</span><span id="nav-txt-matches"></span>
  </button>
  <button onclick="showView('leaderboard')" id="nav-leaderboard">
    <span class="icon">📊</span><span id="nav-txt-leaderboard"></span>
  </button>
  <button onclick="showView('admin')" id="nav-admin">
    <span class="icon">⚙️</span>Admin
  </button>
</nav>

}

// ══════════════════════════════════════════════
//  FIREBASE INIT
// ══════════════════════════════════════════════
function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    firebaseOK = true;
    listenToData();
  } catch(e) {
    console.warn('Firebase not configured:', e.message);
    showToast('⚠️ Chưa cấu hình Firebase – chạy offline');
  }
}

function listenToData() {
  if (!firebaseOK) return;
  db.ref('predictions').on('value', snap => {
    predictions = snap.val() || {};
    renderCurrentView();
  });
  db.ref('results').on('value', snap => {
    results = snap.val() || {};
    renderCurrentView();
  });
  db.ref('scores').on('value', snap => {
    scores = snap.val() || {};
    renderCurrentView();
  });
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function isLocked(match) {
  return new Date() >= new Date(match.kickoff);
}
function getPrediction(matchId, player) {
  return predictions[matchId]?.[player] || null;
}
// Người chơi "tham gia" khi đã có ít nhất 1 dự đoán bất kỳ
function isPlayerActive(player) {
  return Object.values(predictions).some(mp => mp?.[player]);
}
// Nếu đã tham gia + hết giờ + chưa đoán → 5-5. Chưa tham gia → null
function getEffectivePrediction(matchId, player) {
  const p = getPrediction(matchId, player);
  if (p) return p;
  if (isLocked(MATCHES.find(m=>m.id===matchId)) && isPlayerActive(player)) return DEFAULT_SCORE;
  return null;
}
function formatDate(dateStr) {
  // dateStr là VN date (UTC+7)
  const d = new Date(dateStr + 'T00:00:00+07:00');
  return d.toLocaleDateString('vi-VN', {weekday:'short', day:'numeric', month:'numeric'});
}
function formatKickoffVN(utcStr) {
  const d = new Date(utcStr);
  const vn = new Date(d.getTime() + 7*3600*1000);
  const hh = String(vn.getUTCHours()).padStart(2,'0');
  const mm = String(vn.getUTCMinutes()).padStart(2,'0');
  const day = vn.getUTCDate();
  const month = vn.getUTCMonth()+1;
  const days = ['CN','T2','T3','T4','T5','T6','T7'];
  const dow = days[vn.getUTCDay()];
  return `${dow} ${day}/${month} lúc ${hh}:${mm}`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setFilter(el, filter) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = filter;
  renderMatches();
}
function renderMatches() {
  if (!currentPlayer) return;
  let filtered = MATCHES;
  const now = new Date();
  if (currentFilter === 'open') filtered = MATCHES.filter(m => !isLocked(m) && !results[m.id]);
  if (currentFilter === 'done') filtered = MATCHES.filter(m => results[m.id]);
  if (currentFilter === 'pending') filtered = MATCHES.filter(m => !isLocked(m) && !getPrediction(m.id, currentPlayer));

  // Group by date
  const byDate = {};
  filtered.forEach(m => {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });

  const container = document.getElementById('matches-list');
  if (filtered.length === 0) {
    container.innerHTML = '<p class="empty-msg">Không có trận nào</p>';
    return;
  }
  container.innerHTML = Object.entries(byDate).map(([date, matches]) => `
    <div class="date-group">
      <div class="date-label">📅 ${formatDate(date)}</div>
      ${matches.map(m => renderMatchCard(m)).join('')}
    </div>
  `).join('');
}
function renderMatchCard(m) {
  const locked = isLocked(m);
  const hasResult = results[m.id];
  const myPred = getPrediction(m.id, currentPlayer);
  const effectivePred = getEffectivePrediction(m.id, currentPlayer);

  let statusHtml, predHtml = '', resultHtml = '';

  if (hasResult) {
    statusHtml = `<span class="match-status done">✅ Kết quả: ${hasResult}</span>`;
    if (effectivePred) {
      const pts = scores[currentPlayer]?.[m.id]?.points ?? '?';
      const ptsClass = pts > 0 ? 'pts-plus' : (pts < 0 ? 'pts-minus' : '');
      const correctData = scores[currentPlayer]?.[m.id];
      const isC = correctData && (correctData.correct === true || correctData.points === 100);
      const isW = correctData && (correctData.correct === false || correctData.points === -20);
      const resultMark = correctData ? (isC ? `<span style="color:var(--green)"> ${t('correctLabel')}</span>` : `<span style="color:var(--red)"> ${t('wrongLabel')}</span>`) : '';
      predHtml = `<span class="my-prediction">${t('myPred')}: <span class="score">${effectivePred}</span>${resultMark}</span>`;
    }
  } else if (locked) {
    statusHtml = `<span class="match-status locked">🔒 ${t('locked')}</span>`;
    if (effectivePred) {
      predHtml = `<span class="my-prediction">${t('myPred')}: <span class="score">${effectivePred}</span>${!myPred?' '+t('auto'):''}</span>`;
    }
  } else {
    statusHtml = `<span class="match-status open">🕐 ${formatKickoffVN(m.kickoff)}</span>`;
    if (myPred) {
      predHtml = `<span class="my-prediction">${t('myPred')}: <span class="score">${myPred}</span> ✏️</span>`;
    } else {
      predHtml = `<span class="my-prediction" style="color:var(--accent2)">${t('notPredicted')}</span>`;
    }
  }

  // Số người đã dự đoán
  const predictors = PLAYERS.filter(p => getPrediction(m.id, p));
  const predCount = predictors.length;
  const predCountHtml = `<span class="pred-count" onclick="togglePredictors(event,${m.id})" title="Xem ai đã đoán">👥 ${predCount}/${PLAYERS.length}</span>`;
  const predictorListHtml = `<div class="predictor-list" id="predictors-${m.id}" style="display:none">${predictors.map(p=>`<span class="predictor-chip ${p===currentPlayer?'me':''}">${p}</span>`).join('')}${predictors.length===0?`<span style="color:var(--text2);font-size:12px">${t('noOne')}</span>`:''}</div>`;

  return `
    <div class="match-card ${locked?'locked':''}" ${!locked ? `onclick="openModal(${m.id})"` : ''}>
      <span class="group-badge">Bảng ${m.group}</span>
      <div class="match-teams">
        <span class="team-name left">${tn(m.team1)}</span>
        <span class="vs">VS</span>
        <span class="team-name right">${tn(m.team2)}</span>
      </div>
      <div class="match-meta">
        ${statusHtml}
        <div style="display:flex;align-items:center;gap:8px">${predCountHtml}${predHtml}</div>
      </div>
      ${predictorListHtml}
    </div>
  `;
}

function togglePredictors(e, matchId) {
  e.stopPropagation();
  const el = document.getElementById('predictors-' + matchId);
  if (el) el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

// ══════════════════════════════════════════════
//  PREDICT MODAL
// ══════════════════════════════════════════════
function openModal(matchId) {
  const m = MATCHES.find(x => x.id === matchId);
  if (!m || isLocked(m)) return;
  activeMatchId = matchId;
  document.getElementById('modal-match-title').textContent = `${tn(m.team1)} vs ${tn(m.team2)}`;
  document.getElementById('modal-match-sub').textContent = `${t('group')} ${m.group} · ${formatDate(m.date)}`;
  const existing = getPrediction(matchId, currentPlayer);
  const [g1, g2] = existing ? existing.split('-') : ['0','0'];
  document.getElementById('pred-score1').value = g1;
  document.getElementById('pred-score2').value = g2;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  activeMatchId = null;
}
async function submitPrediction() {
  if (!currentPlayer || !activeMatchId) return;
  const m = MATCHES.find(x => x.id === activeMatchId);
  if (!m || isLocked(m)) return;
  const s1 = parseInt(document.getElementById('pred-score1').value) || 0;
  const s2 = parseInt(document.getElementById('pred-score2').value) || 0;
  const score = `${s1}-${s2}`;
  if (firebaseOK) {
    await db.ref(`predictions/${activeMatchId}/${currentPlayer}`).set(score);
  } else {
    if (!predictions[activeMatchId]) predictions[activeMatchId] = {};
    predictions[activeMatchId][currentPlayer] = score;
  }
  document.getElementById('modal-overlay').classList.remove('open');
  activeMatchId = null;
  showToast(t('toasted', score));
  renderMatches();
}

// ══════════════════════════════════════════════
//  LEADERBOARD
// ══════════════════════════════════════════════
function renderLeaderboard() {
  // Chỉ hiện người đã có ít nhất 1 dự đoán
  const activePlayers = PLAYERS.filter(p => isPlayerActive(p));
  const lb = activePlayers.map(p => {
    let correct = 0, wrong = 0;
    Object.entries(scores[p] || {}).forEach(([mid, data]) => {
      // Hỗ trợ cả format cũ (points) và mới (correct)
      const isCorrect = data.correct === true || data.points === 100;
      const isWrong = data.correct === false || data.points === -20;
      if (isCorrect) correct++;
      else if (isWrong) wrong++;
    });
    return {name: p, correct, wrong, total: correct + wrong};
  }).sort((a,b) => b.correct - a.correct || a.wrong - b.wrong);

  const medals = ['🥇','🥈','🥉'];
  document.getElementById('lb-list').innerHTML = lb.length === 0
    ? `<p class="empty-msg">${t('notPredicted')}</p>`
    : lb.map((p, i) => {
    const isMe = p.name === currentPlayer;
    return `
      <div class="lb-card">
        <div class="lb-rank r${i+1}">${i < 3 ? medals[i] : i+1}</div>
        <div>
          <div class="lb-name">${p.name}${isMe ? `<span class="me-badge">${t('me')}</span>` : ''}</div>
          <div class="lb-detail">${t('correctLabel')}: ${p.correct} · ${t('wrongLabel')}: ${p.wrong}</div>
        </div>
        <div class="lb-pts" style="font-size:22px">${p.correct}<span style="font-size:13px;color:var(--text2)"> ${t('correct').toLowerCase()}</span></div>
      </div>
    `;
  }).join('');

  // My stats
  const me = lb.find(p => p.name === currentPlayer);
  if (me && currentPlayer) {
    document.getElementById('my-stats').style.display = 'grid';
    document.getElementById('stat-correct').textContent = me.correct;
    document.getElementById('stat-wrong').textContent = me.wrong;
    document.getElementById('stat-total').textContent = me.total;
  }
}

// ══════════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════════
function adminLogin() {
  const pwd = document.getElementById('admin-pwd-input').value;
  if (pwd === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('admin-login-form').style.display = 'none';
    document.getElementById('admin-panel').classList.add('open');
    renderAdminMatchSelect();
  } else {
    showToast(t('wrongPwd'));
  }
}
function renderAdminMatchSelect() {
  if (!isAdmin) return;
  const sel = document.getElementById('admin-match-select');
  sel.innerHTML = '<option value="">-- Chọn trận đấu --</option>' +
    MATCHES.map(m => `<option value="${m.id}">[${m.group}] ${tn(m.team1)} vs ${tn(m.team2)} (${formatDate(m.date)})${results[m.id] ? ' ✅' : ''}</option>`).join('');
}
function onAdminMatchSelect() {
  const id = parseInt(document.getElementById('admin-match-select').value);
  if (!id) return;
  const m = MATCHES.find(x => x.id === id);
  document.getElementById('admin-team1').textContent = tn(m.team1);
  document.getElementById('admin-team2').textContent = tn(m.team2);
  if (results[id]) {
    const [s1,s2] = results[id].split('-');
    document.getElementById('admin-score1').value = s1;
    document.getElementById('admin-score2').value = s2;
  } else {
    document.getElementById('admin-score1').value = 0;
    document.getElementById('admin-score2').value = 0;
  }
  document.getElementById('admin-match-info').textContent =
    `Bảng ${m.group} · ${formatDate(m.date)} · Deadline: ${new Date(m.deadline).toLocaleString('vi-VN')}`;
  renderAdminPredictions();
}
async function adminSaveResult() {
  const id = parseInt(document.getElementById('admin-match-select').value);
  if (!id) { showToast(t('chooseMatch')); return; }
  const s1 = parseInt(document.getElementById('admin-score1').value) || 0;
  const s2 = parseInt(document.getElementById('admin-score2').value) || 0;
  const actualScore = `${s1}-${s2}`;

  // Save result
  if (firebaseOK) {
    await db.ref(`results/${id}`).set(actualScore);
  } else {
    results[id] = actualScore;
  }

  // Chỉ tính cho người đã tham gia (có ít nhất 1 dự đoán)
  const resultItems = [];
  for (const player of PLAYERS) {
    if (!isPlayerActive(player)) continue;
    const pred = getEffectivePrediction(id, player);
    const isCorrect = pred === actualScore;
    const data = {predicted: pred || DEFAULT_SCORE, actual: actualScore, correct: isCorrect};
    if (firebaseOK) {
      await db.ref(`scores/${player}/${id}`).set(data);
    } else {
      if (!scores[player]) scores[player] = {};
      scores[player][id] = data;
    }
    resultItems.push({player, pred: pred || DEFAULT_SCORE, isCorrect});
  }

  // Show results
  document.getElementById('admin-result-list').innerHTML =
    resultItems.map(r => `
      <div class="admin-result-item">
        <span>${r.player}</span>
        <span>${r.pred}</span>
        <span style="color:${r.isCorrect?'var(--green)':'var(--red)'};font-weight:800">${r.isCorrect ? t('correctLabel') : t('wrongLabel')}</span>
      </div>
    `).join('');

  showToast(t('toastedResult', actualScore));
  renderAdminMatchSelect();
}
function renderAdminPredictions() {
  if (!isAdmin) return;
  const id = parseInt(document.getElementById('admin-match-select').value);
  if (!id) return;
  const m = MATCHES.find(x => x.id === id);
  const actual = results[id];
  const html = PLAYERS.map(p => {
    const pred = getEffectivePrediction(id, p) || '—';
    const pData = predictions[id]?.[p];
    const isAuto = !pData && isLocked(m);
    const scoreData = scores[p]?.[id];
    const isC2 = scoreData && (scoreData.correct === true || scoreData.points === 100);
    const resultTag = scoreData ? `<span style="color:${isC2?'var(--green)':'var(--red)'};font-weight:800">${isC2?t('correctLabel'):t('wrongLabel')}</span>` : '';
    return `<div class="admin-result-item">
      <span>${p}</span>
      <span>${pred}${isAuto?' <em style="color:var(--text2);font-size:11px">'+t('auto')+'</em>':''}</span>
      ${resultTag}
    </div>`;
  }).join('');
  document.getElementById('admin-predictions-view').innerHTML =
    `<p style="font-size:12px;color:var(--text2);margin-bottom:8px">${t('predOf')}</p>${html}`;
}
